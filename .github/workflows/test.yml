name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y zsh

      - name: Install bats-core
        uses: bats-core/bats-action@2.0.0

      - name: Run tests
        run: bats tests/ctask.bats
